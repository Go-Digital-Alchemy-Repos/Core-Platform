services:
  postgres:
    image: postgres:16-alpine
    container_name: core-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: core_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - core-platform-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d core_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  core-platform-postgres-data:
